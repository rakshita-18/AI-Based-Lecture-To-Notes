<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LectureLoom</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-1:#0b0b0d;
  --bg-2:#101217;
  --gold-1:#ffcc00;
  --gold-2:#ff9900;
  --cyan:#1ea7ff;
  --text:#e9eef6;
  --muted:#a7b3c6;
}

<!--/* === Base === */
*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; font-family:"Poppins",sans-serif; }
body{
  background: radial-gradient(800px 800px at 10% 10%, rgba(30,167,255,.15), transparent 60%),
              radial-gradient(800px 800px at 90% 80%, rgba(255,204,0,.12), transparent 60%),
              linear-gradient(180deg, var(--bg-1), var(--bg-2));
  color:var(--text);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

/* Background animation */
body::before{
  content:"";
  position:fixed; inset:-20%;
  background: radial-gradient(50% 50% at 30% 40%, rgba(30,167,255,.15), transparent 60%),
              radial-gradient(45% 45% at 70% 70%, rgba(255,153,0,.12), transparent 60%);
  filter:blur(35px);
  animation:float 18s ease-in-out infinite;
  pointer-events:none;
}
@keyframes float{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(20px,-30px);}
}

/* Main box */
.box{
  text-align:center;
  padding:50px 30px;
  background:rgba(255,255,255,0.05);
  border-radius:22px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,.45);
  animation:fadeUp 1s ease forwards;
  opacity:0; transform:translateY(30px);
}
@keyframes fadeUp{to{opacity:1; transform:translateY(0);}}

/* Logo */
.logo{
  display:flex; align-items:center; justify-content:center; gap:12px;
  font-size: clamp(34px,5vw,52px);
  font-weight:700;
  color:#ffd700;
  text-shadow:0 0 16px rgba(255,204,0,.2);
  transition:transform .3s ease;
}
.logo:hover{ transform:translateY(-3px);}
.logo-icon{
  width:60px; height:60px;
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:28px; color:#0b0b0d;
  background:linear-gradient(135deg,var(--gold-1),var(--gold-2));
  box-shadow:0 10px 24px rgba(255,193,7,.25);
  transition:transform .4s ease;
}
.logo:hover .logo-icon{ transform:rotateY(15deg) rotateX(8deg); }

/* Tagline (centered under LectureLoom) */
.tagline{
  margin-top:18px;
  font-size: clamp(18px,2vw,20px);
  color:var(--text);
  font-weight:600;
  letter-spacing:0.5px;
}
.subtitle{
  font-size:15px;
  color:var(--muted);
  margin-top:4px;
}

/* Buttons */
.btn-group{
  margin-top:35px;
  display:flex; justify-content:center; gap:16px; flex-wrap:wrap;
}
.btn{
  position:relative;
  padding:12px 28px;
  font-size:16px;
  font-weight:700;
  border:none; border-radius:12px;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex; align-items:center; justify-content:center;
  overflow:hidden;
  transition:transform .2s ease, box-shadow .2s ease;
}
.btn::after{
  content:"";
  position:absolute; inset:-2px;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
  transform:translateX(-120%);
  transition:transform .6s ease;
}
.btn:hover::after{ transform:translateX(120%); }
.btn:hover{ transform:translateY(-2px); }

.btn-login{
  background:linear-gradient(135deg,var(--gold-1),var(--gold-2));
  color:#0b0b0d;
  box-shadow:0 10px 20px rgba(255,193,7,.25);
}
.btn-register{
  background:linear-gradient(135deg,rgba(30,167,255,.15),rgba(30,167,255,.08));
  border:1px solid rgba(30,167,255,.4);
  color:var(--text);
  box-shadow:0 10px 20px rgba(30,167,255,.15);
}

/* Ripple */
.btn .ripple{
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,.45);
  transform:scale(0);
  animation:ripple .6s ease-out forwards;
  pointer-events:none;
}
@keyframes ripple{to{transform:scale(12);opacity:0;}}

.links{
  margin-top:25px; font-size:13px; color:var(--muted);
}
.links a{ color:var(--cyan); text-decoration:none;}
.links a:hover{text-decoration:underline;}
</style>
</head>

<body>
  <div class="box">
    <div class="logo">
      <div class="logo-icon">L</div>
      LectureLoom
    </div>

    <div class="tagline">Capture • Learn • Summarize</div>
    <div class="subtitle">Your simple, smart study assistant</div>

    <div class="btn-group">
      <a href="{{ url_for('login_page') }}" class="btn btn-login" id="loginBtn">Login</a>
      <a href="{{ url_for('register_page') }}" class="btn btn-register" id="registerBtn">Register</a>
    </div>

    <div class="links">
      New here? <a href="{{ url_for('register_page') }}">Create an account</a>
    </div>
  </div>

<script>
function addRipple(e){
  const btn=e.currentTarget;
  const rect=btn.getBoundingClientRect();
  const ripple=document.createElement('span');
  ripple.className='ripple';
  ripple.style.left=(e.clientX-rect.left)+'px';
  ripple.style.top=(e.clientY-rect.top)+'px';
  btn.appendChild(ripple);
  setTimeout(()=>ripple.remove(),600);
}
document.getElementById('loginBtn').addEventListener('click',addRipple);
document.getElementById('registerBtn').addEventListener('click',addRipple);
</script>
</body>
</html>
