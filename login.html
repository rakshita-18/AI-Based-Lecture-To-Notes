<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login • LectureLoom</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root{
      --bg-1:#0b0b0d;
      --bg-2:#101217;
      --gold-1:#ffcc00;
      --gold-2:#ff9900;
      --cyan:#1ea7ff;
      --text:#e9eef6;
      --muted:#a7b3c6;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family:"Poppins",sans-serif; color:var(--text); }
    body{
      display:flex; align-items:center; justify-content:center;
      background:
        radial-gradient(1100px 1100px at 12% 15%, rgba(30,167,255,.14), transparent 60%),
        radial-gradient(900px 900px at 88% 85%, rgba(255,204,0,.12), transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      overflow:hidden;
    }

    /* Animated mesh glow */
    body::before, body::after{
      content:""; position:fixed; inset:-20%;
      background:
        radial-gradient(50% 50% at 25% 35%, rgba(30,167,255,.15), transparent 60%),
        radial-gradient(45% 45% at 75% 70%, rgba(255,153,0,.12), transparent 60%),
        radial-gradient(40% 40% at 50% 50%, rgba(255,0,127,.06), transparent 60%);
      filter: blur(34px);
      animation: drift 24s ease-in-out infinite;
      pointer-events:none; z-index:0; opacity:.85;
    }
    body::after{ animation-duration: 32s; animation-direction: reverse; opacity:.6; }
    @keyframes drift{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(24px,-18px)} }

    /* Subtle grid */
    .grid{
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(60% 60% at 50% 50%, black 60%, transparent 100%);
    }

    /* Card */
    .login-card{
      position:relative; z-index:1;
      width: min(420px, 92vw);
      padding: 28px 26px 26px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      transform: translateY(24px); opacity:0;
      animation: rise .9s cubic-bezier(.2,.7,.2,1) .1s forwards;
    }
    @keyframes rise{ to{ transform:translateY(0); opacity:1; } }

    /* Brand header */
    .brand{
      display:flex; align-items:center; justify-content:center; gap:12px;
      margin-bottom: 6px;
      text-decoration:none;
    }
    .logo-icon{
      width:56px; height:56px; border-radius:14px; flex:0 0 auto;
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:26px; color:#0b0b0d;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
      box-shadow: 0 10px 24px rgba(255,193,7,.25);
      transition: transform .35s ease;
    }
    .brand-title{
      font-size: 28px; font-weight:700; color:#ffd700;
      text-shadow: 0 0 12px rgba(255,204,0,.2);
      letter-spacing:.3px;
      transition: transform .35s ease;
    }
    .brand:hover .logo-icon{ transform: rotateY(12deg) rotateX(6deg); }
    .brand:hover .brand-title{ transform: translateY(-2px); }

    .subtitle{
      text-align:center; margin-bottom: 14px;
      font-size: 14px; color: var(--muted);
    }

    /* Heading */
    h2{
      margin: 2px 0 10px; text-align:center; font-size: 22px; font-weight:700;
      color: var(--text);
    }

    /* Inputs */
    .input-group{ position:relative; margin: 20px 0 22px; }
    .input{
      width:100%; padding: 14px 44px 14px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px; color: var(--text); font-size: 15px;
      outline:none; transition: border .2s ease, box-shadow .2s ease, background .2s ease;
    }
    .input:focus{
      border-color: rgba(30,167,255,.65);
      box-shadow: 0 0 0 4px rgba(30,167,255,.18);
      background: rgba(255,255,255,0.08);
    }
    .label{
      position:absolute; left:12px; top:50%; transform: translateY(-50%);
      color:#cdd6e4; font-size: 14px; pointer-events:none; transition:.2s ease;
      background: transparent; padding: 0 .25rem;
    }
    .input:focus + .label,
    .input:not(:placeholder-shown) + .label{
      top:-8px; left:10px; font-size:11px; color: var(--cyan);
      background: linear-gradient(180deg, transparent 35%, rgba(16,18,23,.8) 36%);
    }

    /* Toggle password */
    .toggle{
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      cursor:pointer; color:#cdd6e4; font-size: 14px; user-select:none;
      transition: color .2s ease;
    }
    .toggle:hover{ color: var(--cyan); }

    /* Button */
    .btn{
      width:100%; padding: 12px 16px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
      color:#0b0b0d; font-weight:700; font-size: 16px; cursor:pointer;
      box-shadow: 0 12px 24px rgba(255,193,7,.22);
      transition: transform .18s ease, box-shadow .18s ease;
      position:relative; overflow:hidden;
    }
    .btn:hover{ transform: translateY(-2px); box-shadow: 0 18px 34px rgba(255,193,7,.3); }
    .btn:active{ transform: translateY(0); }

    /* Button shimmer */
    .btn::after{
      content:""; position:absolute; inset:-2px;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,.4), transparent);
      transform: translateX(-120%);
      transition: transform .6s ease;
      pointer-events:none;
    }
    .btn:hover::after{ transform: translateX(120%); }

    /* Button ripple */
    .ripple{
      position:absolute; border-radius:50%; background: rgba(255,255,255,.45);
      transform: scale(0); animation: ripple .6s ease-out forwards; pointer-events:none;
      mix-blend-mode: screen;
    }
    @keyframes ripple{ to{ transform: scale(12); opacity:0; } }

    /* Links */
    .options{ margin-top: 14px; text-align:center; font-size: 14px; color: var(--muted); }
    .options a{ color: var(--cyan); text-decoration: none; }
    .options a:hover{ text-decoration: underline; }

    /* Footer mini-links */
    .mini{ margin-top: 10px; text-align:center; font-size:12px; color: var(--muted); }
    .mini a{ color:#ffd700; text-decoration:none; }
    .mini a:hover{ text-decoration:underline; }

    @media (prefers-reduced-motion: reduce){
      body::before, body::after{ animation: none; }
      .login-card{ animation: none; opacity:1; transform:none; }
      .btn::after{ display:none; }
    }
  </style>
</head>

<body>
  <div class="grid" aria-hidden="true"></div>

  <div class="login-card">
    <!-- Brand / Logo -->
    <a class="brand" href="{{ url_for('home1') }}" aria-label="LectureLoom home">
      <div class="logo-icon" aria-hidden="true">L</div>
      <div class="brand-title">LectureLoom</div>
    </a>


    <h2>Login</h2>

    <form action="/login" method="POST" novalidate>
      <!-- Username -->
      <div class="input-group">
        <input class="input" type="text" name="username" id="username" required placeholder=" " />
        <label class="label" for="username">Username</label>
      </div>

      <!-- Password -->
      <div class="input-group" style="margin-top: 18px;">
        <input class="input" type="password" name="password" id="password" required placeholder=" " />
        <label class="label" for="password">Password</label>
        <span class="toggle" id="togglePwd" title="Show/Hide password">👁️</span>
      </div>

      <button type="submit" class="btn" id="loginBtn">Login</button>

      <div class="options">
        <p>Don’t have an account? <a href="{{ url_for('register_page') }}">Register</a></p>
      </div>
      <div class="mini">
        <a href="{{ url_for('register_page') }}">Create account</a> •
        <a href="{{ url_for('login_page') }}">Try again</a>
      </div>
    </form>
  </div>

  <script>
    // Show/Hide password
    const pwd = document.getElementById('password');
    const toggle = document.getElementById('togglePwd');
    toggle.addEventListener('click', ()=>{
      const isPwd = pwd.type === 'password';
      pwd.type = isPwd ? 'text' : 'password';
      toggle.textContent = isPwd ? '🙈' : '👁️';
    });

    // Button ripple
    const btn = document.getElementById('loginBtn');
    btn.addEventListener('click', function(e){
      const rect = this.getBoundingClientRect();
      const span = document.createElement('span');
      span.className = 'ripple';
      span.style.left = (e.clientX - rect.left) + 'px';
      span.style.top  = (e.clientY - rect.top)  + 'px';
      this.appendChild(span);
      setTimeout(()=> span.remove(), 600);
    });

    // Optional: basic client validation feedback (border glow)
    document.querySelector('form').addEventListener('submit', function(e){
      const u = document.getElementById('username');
      if(!u.value.trim() || !pwd.value.trim()){
        e.preventDefault();
        [u,pwd].forEach(inp=>{
          inp.style.boxShadow = '0 0 0 4px rgba(255,0,127,.18)';
          setTimeout(()=> inp.style.boxShadow = '', 500);
        });
      }
    });
  </script>
</body>
</html>
